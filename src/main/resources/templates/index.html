<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IU Campus Room Reservations</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<!-- CHANGE 1: white background, dark text, normal layout -->
<body class="bg-white text-gray-800 min-h-screen flex flex-col items-center justify-center">

  <div class="text-center px-6">

    <!-- CHANGE 2: removed the emoji, replaced with plain text or nothing -->
    <h1 class="text-4xl font-bold mb-3 text-gray-900">
      IU Campus Room Reservations
    </h1>

    <!-- CHANGE 3: removed the em dash, plain sentence -->
    <p class="text-gray-500 text-base mb-8">
      Search, book, and manage campus rooms all in one place.
    </p>

    <!-- CHANGE 4: normal buttons, no shadow-lg, no rounded-xl overkill -->
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/book"
         class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded font-semibold">
        Book a Room
      </a>
      <a href="/dashboard"
         class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-3 rounded font-semibold">
        My Bookings
      </a>
    </div>
  </div>

  <!--  -->
  <div class="mt-16 grid grid-cols-1 sm:grid-cols-3 gap-4 px-8 max-w-4xl">

    <div class="border border-gray-300 rounded p-5 text-center">
      <h3 class="font-semibold text-gray-800 mb-1">Search Rooms</h3>
      <p class="text-gray-500 text-sm">Find available rooms by date and time.</p>
    </div>

    <div class="border border-gray-300 rounded p-5 text-center">
      <h3 class="font-semibold text-gray-800 mb-1">Instant Booking</h3>
      <p class="text-gray-500 text-sm">Reserve your room in seconds.</p>
    </div>

    <div class="border border-gray-300 rounded p-5 text-center">
      <h3 class="font-semibold text-gray-800 mb-1">Manage Bookings</h3>
      <p class="text-gray-500 text-sm">View and cancel your reservations.</p>
    </div>

  </div>

</body>
</html>
