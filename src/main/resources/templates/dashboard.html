<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800 min-h-screen p-8">

  <div class="max-w-2xl mx-auto">
    <a href="/" class="text-blue-600 hover:underline text-sm mb-6 inline-block">Back to Home</a>

    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold">My Bookings</h1>
      <a href="/book" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-semibold">
        New Booking
      </a>
    </div>

    <!-- Loading state -->
    <p id="loading" class="text-gray-500">Loading bookings...</p>

    <!-- Empty state -->
    <div id="empty" class="hidden text-center py-16 text-gray-500">
      <p class="text-lg mb-2">No bookings yet.</p>
      <a href="/book" class="text-blue-600 hover:underline">Book your first room</a>
    </div>

    <!-- Bookings List -->
    <div id="bookings" class="space-y-3"></div>
  </div>

  <script>
    async function loadBookings() {
      const res = await fetch('/api/bookings');
      const data = await res.json();

      document.getElementById('loading').classList.add('hidden');
      const container = document.getElementById('bookings');
      const empty = document.getElementById('empty');

      if (data.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      // This render the bookings and also allows for cancellation 
      container.innerHTML = data.map(b => `
        <div class="border border-gray-300 rounded p-4 flex items-center justify-between">
          <div>
            <p class="font-semibold">${b.userName}</p>
            <p class="text-blue-600 text-sm">Room: ${b.roomID}</p>
            <p class="text-gray-500 text-sm mt-1">${b.date} | ${b.startTime} to ${b.endTime}</p>
          </div>
          <button onclick="cancelBooking(${b.id}, this)"
                  class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded text-sm">
            Cancel
          </button>
        </div>
      `).join('');
    }

    async function cancelBooking(id, btn) {
      btn.textContent = 'Cancelling...';
      btn.disabled = true;
      await fetch('/api/bookings/' + id, { method: 'DELETE' });
      loadBookings();
    }

    loadBookings();
  </script>

</body>
</html>
