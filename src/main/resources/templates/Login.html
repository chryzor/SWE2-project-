<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Reservation Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-lg shadow w-full max-w-sm">
    <h1 class="text-2xl font-semibold text-gray-800 mb-1">Campus Reservation</h1>
    <p class="text-sm text-gray-500 mb-6">Login to your account</p>

    <div id="error-message" class="mb-4 text-red-600 text-sm" style="display: none;"></div>

    <form action="/login" method="post">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Email</label>
        <input
          type="email" id="username" name="username" placeholder="you@university.edu"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input
          type="password" id="password" name="password" placeholder="••••••••"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded transition"
      >
        Sign In
      </button>
    </form>
  </div>

  <script>
    // Check for login error in URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error')) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = 'Invalid username or password';
      errorDiv.style.display = 'block';
    }
    if (urlParams.get('logout')) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = 'You have been logged out';
      errorDiv.style.display = 'block';
      errorDiv.className = 'mb-4 text-green-600 text-sm';
    }
  </script>

</body>
</html>
