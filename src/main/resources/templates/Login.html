<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Reservation Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-lg shadow w-full max-w-sm">
    <h1 class="text-2xl font-semibold text-gray-800 mb-1">Campus Reservation</h1>
    <p class="text-sm text-gray-500 mb-6">Login to your account</p>

    <div th:if="${param.error}" class="mb-4 text-sm text-red-600">
      Invalid username or password
    </div>
    <div th:if="${param.logout}" class="mb-4 text-sm text-green-600">
      You have been logged out
    </div>

    <form th:action="@{/login}" method="post">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
        <input
          type="text" id="username" name="username" placeholder="admin" required
          required
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input
          type="password" id="password" name="password" placeholder="password" required
          required
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded transition"
      >
        Sign In
      </button>
    </form>
  </div>

</body>
</html>
